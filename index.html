<!DOCTYPE html>
<html>
<head>
    <title>Untitled Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.18.0/js/md5.min.js"></script>
        <script>
        let savedUsername = "";
        let savedPassword = "";
        function register(){
            savedUsername = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            savedPassword = md5(password);
            document.getElementById("result").innerHTML = "Encrypted Password: " + savedPassword;
        }

        function login(){
            let loginUsername = document.getElementById("loginUsername").value;
            let loginPassword = document.getElementById("loginPassword").value;
            let encryptedPassword = md5(loginPassword);
            if(loginUsername == savedUsername &&
               encryptedPassword == savedPassword){
                document.getElementById("result").innerHTML = "Login Successful";
            }
            else{
                document.getElementById("result").innerHTML = "Invalid Username or Password";
            }
        }
    </script>

    <style>
        body{
            font-family: Arial;
            background-color:antiquewhite;
            text-align: center;
        }
        .box{
            width: 500px;
            margin: auto;
            background-color:beige;
            padding: 30px;
            margin-top: 40px;
            border: 3px solid black;
        }
        h1{
            color: #1e3d59;
        }
        h2{
            text-align: left;
        }
        input{
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button{
            padding: 10px 20px;
            background-color:blue;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        p{
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>PHP Login Registration Form with Password Encryption</h1>

        <h2>Registeration:</h2>
        <input type="text" id="username"
        placeholder="Enter Username">
        <br>
        <input type="password" id="password"
        placeholder="Enter Password">
        <br>
        <button onclick="register()">
            Register
        </button>

        <h2>Login:</h2>
        <input type="text" id="loginUsername"
        placeholder="Enter Username">
        <br>
        <input type="password" id="loginPassword"
        placeholder="Enter Password">
        <br>
        <button onclick="login()">
            Login
        </button>
        <p id="result"></p>
    </div>
</body>
</html>
